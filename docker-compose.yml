# One-command local dev:  docker compose up
# Needs a .env at the repo root (copy .env.example). No venv, no ffmpeg install.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
      CORS_ORIGINS: http://localhost:5173
    volumes:
      # Live-reload on edits without rebuilding the image.
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://127.0.0.1:8000
    volumes:
      - ./frontend:/app
      # Keeps container-built node_modules from clobbering the host's (and vice
      # versa) — the native esbuild binary differs between Windows and Alpine.
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  frontend_node_modules:
