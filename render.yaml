# Render blueprint for the backend API.
# The frontend deploys separately to Vercel (see frontend/vercel.json).
services:
  - type: web
    name: speakcoach-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    # NOT the free tier: Whisper + MediaPipe loaded together need ~1.5GB,
    # well over the free instance's 512MB. It will OOM on the first upload.
    plan: standard
    healthCheckPath: /health
    envVars:
      # Set the value in the Render dashboard — never commit the key.
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # Replace with your real Vercel domain once the frontend is deployed.
      - key: CORS_ORIGINS
        sync: false
